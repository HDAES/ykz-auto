name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test, lint and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.13'

      - name: Show build environment
        run: |
          java -version
          gradle --version
          sdkmanager --list_installed

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          gradle testDebugUnitTest --no-daemon --stacktrace --console=plain 2>&1 | tee ci-logs/unit-tests.log

      - name: Run Android lint
        shell: bash
        run: |
          set -o pipefail
          gradle lintDebug --no-daemon --stacktrace --console=plain 2>&1 | tee ci-logs/lint.log

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace --console=plain 2>&1 | tee ci-logs/assemble-debug.log

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ykz-auto-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload CI logs and reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ykz-auto-ci-diagnostics
          path: |
            ci-logs/**
            app/build/reports/**
            app/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
